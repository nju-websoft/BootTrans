data:
  train_files: data/kodcode.jsonl
  val_files: data/validation_humanevalx.jsonl
  prompt_key: source_prompt
  answer_key: solution
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 1024 # 2048
  max_response_length: 1024 # 2048
  rollout_batch_size: 256 # equivalent to verl's data.train_batch_size
  mini_rollout_batch_size: null  # equivalent to verl's data.gen_batch_size
  val_batch_size: 1024
  format_prompt: ./examples/format_prompt/translation.jinja # 不使用prompt template
  override_chat_template: null
  shuffle: true
  seed: 1
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true
  # buffered_loader: true

algorithm:
  adv_estimator: grpo_lang # grpo / grpo_lang
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: true  # dapo filter groups
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 8 # 8  # equivalent to verl's actor.ppo_mini_batch_size
    micro_batch_size_per_device_for_update: 2  # equivalent to verl's actor.ppo_micro_batch_size_per_gpu
    micro_batch_size_per_device_for_experience: 2  # equivalent to verl's rollout.log_prob_micro_batch_size_per_gpu
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 1
    loss_avg_mode: weighted # weighted # token / seq
    model:
      model_path: Qwen/Qwen3-1.7B
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true  # true: more CPU memory; false: more GPU memory
      offload_optimizer: true  # true: more CPU memory; false: more GPU memory

  rollout:
    n: 8 # 8
    temperature: 1.0
    top_p: 1.0
    limit_images: 0
    gpu_memory_utilization: 0.9
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 2 # gpu nums
    disable_tqdm: false
    val_override_config:
      temperature: 0
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true  # true: more CPU memory; false: more GPU memory
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    # reward_type: language
    reward_function: ./examples/reward_function/code_mp.py:compute_score

trainer:
  total_epochs: 3
  max_steps: null
  project_name: easy_r1_tree_grpo_analysis
  experiment_name: qwen_base
  logger: ["file"] # “wandb”
  nnodes: 1
  n_gpus_per_node: 2 # gpu nums
  max_try_make_batch: 20  # -1 means no limit
  val_freq: 1  # -1 to disable
  val_before_train: true
  val_only: false
  val_generations_to_log: 100
  save_freq: 5  # -1 to disable
  save_limit: 3  # -1 to disable
  save_model_only: true
  save_checkpoint_path: null
  load_checkpoint_path: null
  find_last_checkpoint: true
